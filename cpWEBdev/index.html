<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Jogos Favoritos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginContainer">
        <h2>Login</h2>

        <input type="text" id="usuario" placeholder="Usuário">
        <input type="password" id="senha" placeholder="Senha">

        <button onclick="fazerLogin()">Entrar</button>

        <p id="erroLogin"></p>
    </div>

    <div id="appContainer" style="display:none;">
        <h1>Lista de Jogos Favoritos</h1>

        <input type="text" id="novoItem" placeholder="Digite um jogo">
        <button onclick="adicionarFinal()">Adicionar ao Final</button>
        <button onclick="adicionarInicio()">Adicionar ao Início</button>

        <p id="erroItem"></p>

        <ul id="lista"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
